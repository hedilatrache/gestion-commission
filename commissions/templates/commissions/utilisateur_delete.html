<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Supprimer un utilisateur</title>
</head>
<body>
    <h1>Supprimer utilisateur : {{ utilisateur.nom }} {{ utilisateur.prenom }}</h1>
    <p>Êtes-vous sûr de vouloir supprimer cet utilisateur ?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Oui, supprimer</button>
        <a href="{% url 'utilisateurs_list' %}">Annuler</a>
    </form>
</body>
</html>
