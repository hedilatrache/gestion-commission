<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ajouter utilisateur</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 40px 20px;
    color: #333;
}

.container {
    max-width: 500px;
    margin: auto;
    margin-top: 40px;
    background: #fff;
    padding: 30px 25px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

h1 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 1.8rem;
    color: #343a40;
}

.form-group {
    margin-bottom: 18px;
}

label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
    color: #555;
}

input, select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 0.95rem;
    transition: 0.3s;
}

input:focus, select:focus {
    outline: none;
    border-color: #007bff;
    box-shadow: 0 0 6px rgba(0,123,255,0.2);
}

.checkbox-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 10px;
}

.checkbox-group label {
    display: flex;
    align-items: center;
    padding: 6px 12px;
    background: #17a2b8;
    color: #fff;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: 0.3s;
}

.checkbox-group input[type="checkbox"] {
    margin-right: 6px;
    accent-color: #fff;
}

.checkbox-group label:hover {
    background: #138496;
}

.actions {
    margin-top: 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.btn {
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 600;
    transition: 0.3s;
}

.btn-save {
    background: #28a745;
    color: white;
}

.btn-save:hover {
    background: #218838;
}

.btn-back {
    background: #6c757d;
    color: white;
    text-decoration: none;
    padding: 10px 18px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.btn-back:hover {
    background: #5a6268;
}

.error {
    color: red;
    font-size: 0.85rem;
    margin-top: 3px;
}
</style>
</head>

<body>

<div class="container">
<h1>Ajouter un utilisateur</h1>

<form method="post">
    {% csrf_token %}

    <div class="form-group">
        <label>Username</label>
        {{ form.username }}
        {{ form.username.errors }}
    </div>

    <div class="form-group">
        <label>Email</label>
        {{ form.email }}
        {{ form.email.errors }}
    </div>

    <div class="form-group">
        <label>Nom</label>
        {{ form.nom }}
    </div>

    <div class="form-group">
        <label>Prénom</label>
        {{ form.prenom }}
    </div>

    <div class="form-group">
        <label>GSM</label>
        {{ form.gsm }}
    </div>

    <div class="form-group">
        <label>Actif</label>
        {{ form.is_active }}
    </div>

    <div class="form-group">
        <label>Rôle</label>
        {{ form.role }}
        {{ form.role.errors }}
    </div>

    <div class="checkbox-group">
        {% for checkbox in form.roles %}
        <label>
            {{ checkbox.tag }} {{ checkbox.choice_label }}
        </label>
        {% endfor %}
    </div>

    <div class="actions">
        <button class="btn btn-save" type="submit"><i class="fa fa-save"></i> Enregistrer</button>
        <a class="btn-back" href="{% url 'utilisateurs_list' %}"><i class="fa fa-arrow-left"></i> Retour</a>
    </div>

</form>
</div>

</body>
</html>
