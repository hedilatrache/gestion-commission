<h1>Importer Utilisateurs Excel</h1>

{% for message in messages %}
    <div class="{% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</div>
{% endfor %}

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.fichier }}
    <button type="submit">Importer</button>
</form>
